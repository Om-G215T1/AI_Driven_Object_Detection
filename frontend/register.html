<!DOCTYPE html>
<html>
<head>
    <title>Register - AI Detection</title>
</head>
<body style="margin:0; font-family:Arial; background:#f4f6f9;">

<div style="display:flex; justify-content:center; align-items:center; height:100vh;">
    
    <div style="background:white; padding:30px; width:400px; border-radius:10px;">
        
        <h2 style="text-align:center;">Register</h2>

        <form onsubmit="register(event)">
            <input id="username" placeholder="Username" style="width:100%; padding:10px; margin:10px 0;">
            <input id="email" placeholder="Email" style="width:100%; padding:10px; margin:10px 0;">
            <input id="password" type="password" placeholder="Password" style="width:100%; padding:10px; margin:10px 0;">
            <input id="confirm" type="password" placeholder="Confirm Password" style="width:100%; padding:10px; margin:10px 0;">
            <button style="width:100%; padding:10px; background:#27ae60; color:white;">Register</button>
        </form>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
