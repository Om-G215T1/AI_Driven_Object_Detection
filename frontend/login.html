<!DOCTYPE html>
<html>
<head>
    <title>Login - AI Object Detection</title>
</head>
<body style="margin:0; font-family:Arial; background:#f4f6f9;">

<div style="width:100%; height:100vh; display:flex; justify-content:center; align-items:center;">
    
    <div style="background:white; padding:30px; width:350px; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.1);">
        
        <h2 style="text-align:center; margin-bottom:20px;">Login</h2>

        <form onsubmit="login(event)">
            <input id="email" type="email" placeholder="Enter email" required
                style="width:100%; padding:10px; margin:10px 0;">
            <input id="password" type="password" placeholder="Enter password" required
                style="width:100%; padding:10px; margin:10px 0;">
            <button style="width:100%; padding:10px; background:#2c3e50; color:white;">Login</button>
        </form>

        <p style="text-align:center;">
            <a href="register.html">Register</a>
        </p>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
